<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Intelligence Platform</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #03060A;
      --bg2: #060C12;
      --surface: #0C1825;
      --surface2: #121F2E;
      --border: #132030;
      --border2: #1A2D42;
      --gold: #C9A84C;
      --gold2: #F5D78E;
      --teal: #00D4AA;
      --red: #E8394A;
      --orange: #E87B34;
      --blue: #3A7FD5;
      --purple: #8B5CF6;
      --text: #E2EEF7;
      --muted: #3D5A72;
      --muted2: #6E90A8;
      --orb: 'Orbitron', monospace;
      --mono: 'DM Mono', monospace;
      --body: 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
    }

    /* ═══ NOISE TEXTURE OVERLAY ═══ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 1000;
    }

    /* ═══ HEADER ═══ */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(3, 6, 10, 0.96);
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 500;
      backdrop-filter: blur(20px);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--gold);
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark-inner {
      width: 8px;
      height: 8px;
      background: var(--gold);
      transform: rotate(0deg);
    }

    .logo-text {
      font-family: var(--orb);
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 6px;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 2px;
      margin-top: 2px;
    }

    /* Mode switcher */
    .mode-switch {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 3px;
      gap: 3px;
    }

    .mode-btn {
      padding: 7px 20px;
      background: none;
      border: none;
      color: var(--muted2);
      font-family: var(--orb);
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.25s;
      text-transform: uppercase;
    }

    .mode-btn.active {
      background: var(--gold);
      color: var(--bg);
    }

    .mode-btn:hover:not(.active) {
      color: var(--gold);
    }

    /* Header right */
    .header-stats {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .stat-item {
      text-align: right;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--gold2);
      font-weight: 500;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: livepulse 1.5s infinite;
    }

    .risk-bar {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 8px 32px;
      min-height: 34px;
      border-top: 1px solid rgba(255, 70, 70, 0.5);
      border-bottom: 1px solid rgba(255, 70, 70, 0.5);
      background: linear-gradient(to right, rgba(255, 40, 40, 0.9), rgba(10, 4, 4, 0.96));
      font-family: var(--mono);
      font-size: 12px;
      color: #FFEFEF;
    }

    .risk-label {
      font-family: var(--orb);
      font-size: 11px;
      letter-spacing: 4px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #000;
      color: #FF4040;
      box-shadow: 0 0 14px rgba(255, 40, 40, 0.85);
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .risk-marquee {
      overflow: hidden;
      position: relative;
      flex: 1;
      white-space: nowrap;
    }

    .risk-inner {
      display: inline-block;
      padding-left: 8px;
      animation: riskScroll 26s linear infinite;
    }

    .risk-item {
      margin-right: 40px;
      cursor: pointer;
    }

    .risk-item span {
      opacity: 0.8;
    }

    .risk-item span.risk-tag {
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: #FFE06A;
      margin-right: 6px;
    }

    .risk-item:hover span {
      opacity: 1;
    }

    @keyframes riskScroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    @keyframes livepulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.5;
        transform: scale(0.85)
      }
    }

    /* ═══ VIEWS ═══ */
    .view {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      transition: opacity 0.3s, transform 0.3s;
    }

    .view.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.98);
    }

    /* ═══ MAP VIEW ═══ */
    #mapView {
      z-index: 10;
    }

    #mapCanvas {
      width: 100%;
      height: 100%;
      cursor: grab;
      display: block;
    }

    #mapCanvas:active {
      cursor: grabbing;
    }

    /* Map tooltip */
    #mapTooltip {
      position: fixed;
      background: rgba(6, 12, 18, 0.97);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--gold);
      padding: 10px 14px;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 11px;
      pointer-events: none;
      z-index: 600;
      display: none;
      max-width: 220px;
      backdrop-filter: blur(10px);
    }

    .tooltip-name {
      color: var(--gold2);
      font-weight: 500;
      margin-bottom: 3px;
    }

    .tooltip-type {
      color: var(--muted2);
      font-size: 10px;
      letter-spacing: 1px;
    }

    .tooltip-hint {
      color: var(--teal);
      font-size: 10px;
      margin-top: 6px;
    }

    /* Map legend */
    #mapLegend {
      position: fixed;
      bottom: 80px;
      left: 20px;
      background: rgba(6, 12, 18, 0.9);
      border: 1px solid var(--border2);
      padding: 14px 18px;
      border-radius: 3px;
      z-index: 300;
      backdrop-filter: blur(10px);
    }

    .legend-header {
      font-family: var(--orb);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-row:hover {
      background: rgba(255, 255, 255, 0.03);
      transform: translateX(1px);
    }

    .legend-row.active {
      background: rgba(0, 212, 170, 0.08);
      color: var(--text);
    }

    /* Map controls */
    #mapControls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(6, 12, 18, 0.95);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 300;
      backdrop-filter: blur(10px);
    }

    .ctrl-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted2);
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .ctrl-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .ctrl-btn.toggled {
      border-color: var(--purple);
      color: var(--purple);
    }

    .ctrl-sep {
      width: 1px;
      height: 18px;
      background: var(--border2);
    }

    .ctrl-hint {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ═══ INTEL VIEW ═══ */
    #intelView {
      z-index: 10;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
    }

    .intel-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: flex-start;
      gap: 20px;
      flex-shrink: 0;
    }

    .intel-context {
      flex: 1;
    }

    .intel-breadcrumb {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .breadcrumb-sep {
      color: var(--muted);
    }

    .intel-query-display {
      font-family: var(--body);
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .intel-query-area {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      width: 360px;
      flex-shrink: 0;
    }

    .intel-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--body);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 2px;
      outline: none;
      resize: none;
      height: 52px;
      transition: border-color 0.2s;
    }

    .intel-input:focus {
      border-color: var(--gold);
    }

    .intel-input::placeholder {
      color: var(--muted);
    }

    .intel-go {
      background: var(--gold);
      color: var(--bg);
      border: none;
      padding: 0 18px;
      height: 52px;
      font-family: var(--orb);
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .intel-go:hover {
      background: var(--gold2);
    }

    .intel-go:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    /* Quick chips */
    .intel-chips {
      padding: 12px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted2);
      padding: 5px 12px;
      font-family: var(--mono);
      font-size: 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .chip:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 168, 76, 0.05);
    }

    /* Intel body */
    .intel-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .intel-body::-webkit-scrollbar {
      width: 4px;
    }

    .intel-body::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    /* Intel empty */
    .intel-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--muted);
    }

    .empty-hex {
      font-size: 60px;
      opacity: 0.15;
      font-family: var(--orb);
    }

    .empty-title {
      font-family: var(--orb);
      font-size: 16px;
      color: var(--muted2);
      letter-spacing: 4px;
    }

    .empty-desc {
      font-family: var(--mono);
      font-size: 11px;
      text-align: center;
      max-width: 400px;
      line-height: 1.7;
      color: var(--muted);
    }

    /* Intel loading */
    .intel-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
    }

    .intel-spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .intel-loading-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      letter-spacing: 2px;
    }

    .intel-loading-bar {
      width: 200px;
      height: 2px;
      background: var(--border2);
      border-radius: 1px;
      overflow: hidden;
    }

    .intel-loading-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--teal));
      border-radius: 1px;
      animation: barload 1.5s ease-in-out infinite;
    }

    @keyframes barload {
      0% {
        transform: translateX(-100%)
      }

      100% {
        transform: translateX(300%)
      }
    }

    /* Intel results grid */
    .intel-results {
      display: none;
    }

    .intel-results.show {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Cards */
    .icard {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 3px;
      overflow: hidden;
    }

    .icard.full {
      grid-column: 1/-1;
    }

    .icard-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .icard-title {
      font-family: var(--orb);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted2);
      text-transform: uppercase;
    }

    .icard-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 2px;
    }

    .badge-gold {
      background: rgba(201, 168, 76, 0.15);
      color: var(--gold2);
    }

    .badge-teal {
      background: rgba(0, 212, 170, 0.12);
      color: var(--teal);
    }

    .badge-red {
      background: rgba(232, 57, 74, 0.12);
      color: var(--red);
    }

    .badge-blue {
      background: rgba(58, 127, 213, 0.12);
      color: var(--blue);
    }

    .icard-body {
      padding: 16px;
    }

    /* Analysis text */
    .analysis-para {
      font-size: 13px;
      line-height: 1.8;
      color: #B8CDD8;
      margin-bottom: 10px;
    }

    /* Impact bars */
    .impact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .impact-lbl {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      width: 72px;
      flex-shrink: 0;
      text-align: right;
    }

    .impact-track {
      flex: 1;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
    }

    .impact-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .impact-val {
      font-family: var(--mono);
      font-size: 10px;
      width: 36px;
      flex-shrink: 0;
    }

    /* Levels */
    .levels-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .level-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 2px;
    }

    .level-lbl {
      font-family: var(--orb);
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .level-val {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      line-height: 1;
    }

    .level-note {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      margin-top: 4px;
    }

    /* Scenarios */
    .scenario-block {
      border-left: 2px solid var(--border2);
      padding: 12px 14px;
      margin-bottom: 10px;
      border-radius: 0 3px 3px 0;
      background: var(--surface2);
    }

    .scenario-block.bull {
      border-left-color: var(--teal);
    }

    .scenario-block.base {
      border-left-color: var(--gold);
    }

    .scenario-block.bear {
      border-left-color: var(--red);
    }

    .scenario-lbl {
      font-family: var(--orb);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .bull .scenario-lbl {
      color: var(--teal);
    }

    .base .scenario-lbl {
      color: var(--gold);
    }

    .bear .scenario-lbl {
      color: var(--red);
    }

    .scenario-text {
      font-size: 12px;
      line-height: 1.7;
      color: #A8BEC8;
    }

    /* Ripples */
    .ripple-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .ripple-row:last-child {
      border: none;
    }

    .ripple-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      border-radius: 3px;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .ripple-content {
      flex: 1;
    }

    .ripple-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
      color: var(--text);
    }

    .ripple-desc {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      line-height: 1.5;
    }

    .ripple-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 2px;
      align-self: center;
      flex-shrink: 0;
    }

    /* Timeline */
    .tl {
      position: relative;
      padding-left: 30px;
    }

    .tl::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border2);
    }

    .tl-item {
      position: relative;
      margin-bottom: 18px;
    }

    .tl-dot {
      position: absolute;
      left: -24px;
      top: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tl-dot.now {
      border-color: var(--teal);
      box-shadow: 0 0 8px rgba(0, 212, 170, 0.4);
    }

    .tl-dot.soon {
      border-color: var(--gold);
    }

    .tl-dot.later {
      border-color: var(--red);
    }

    .tl-time {
      font-family: var(--orb);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .now .tl-time {
      color: var(--teal);
    }

    .soon .tl-time {
      color: var(--gold);
    }

    .later .tl-time {
      color: var(--red);
    }

    .tl-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .tl-desc {
      font-family: var(--mono);
      font-size: 11px;
